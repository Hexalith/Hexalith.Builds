schema: hexalith.readiness-evidence.v1
project: Hexalith.Builds
markdown_view: readiness.md
validation:
  command: dotnet tool run hexalith-evidence validate test/fixtures/evidence/positive/readiness.yaml
  required_coverage:
    fr: FR-1..FR-1
    nfr: NFR-1..NFR-1
    finding: "1"
    release: "1"
status_legend:
  pending: planned evidence that has not executed
  blocked-external: evidence blocked by an external prerequisite
  not-verified: environment unavailable
  failed: executed evidence failed
  passed: executed evidence passed
  skipped: evidence skipped with a declared reason
defaults:
  repository: Hexalith.Builds
  owner: Builds Owner
  environment: deterministic-local
  pinned_revision: 0123456789abcdef
  status: pending
  release_disposition: release-blocking
