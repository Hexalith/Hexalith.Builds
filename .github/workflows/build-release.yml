name: Release
on:
  push:
    branches:
      - main
      - next
      - next-major
      - alpha
      - beta
      - '[0-9]+.[0-9]+.x'

permissions:
  contents: write        # commit changelog, push tag, create GitHub release
  issues: write          # semantic-release comments on released issues
  pull-requests: write   # semantic-release comments on released PRs

jobs:
  release:
    runs-on: ubuntu-latest
    name: Release
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Initialize .NET
      uses: ./Github/initialize-dotnet

    - name: Validate Dapr package versions
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/validate-dapr-package-versions.ps1

    - name: Test Dapr package validator
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-dapr-package-version-validator.ps1

    - name: Create Release
      uses: ./Github/create-release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
