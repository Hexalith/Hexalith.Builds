name: Release
on:
  push:
    branches:
      - main
      - next
      - next-major
      - alpha
      - beta
      - '[0-9]+.[0-9]+.x'

permissions:
  contents: write        # commit changelog, push tag, create GitHub release
  issues: write          # semantic-release comments on released issues
  pull-requests: write   # semantic-release comments on released PRs
  packages: write        # publish semantic-release prerelease tool packages to GitHub Packages

jobs:
  release:
    runs-on: ubuntu-latest
    name: Release
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Initialize .NET
      uses: ./Github/initialize-dotnet
      with:
        global-json-file: global.json

    - name: Validate central package versions
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/validate-central-package-versions.ps1

    - name: Test central package version validator
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-central-package-version-validator.ps1

    - name: Validate Dapr package versions
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/validate-dapr-package-versions.ps1

    - name: Test Dapr package validator
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-dapr-package-version-validator.ps1

    - name: Test domain workflow test-platform contracts
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-domain-workflow-test-platforms.ps1

    - name: Qualify G-4 tool source and Release packages
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-g4-tool-package-contracts.ps1 -Version "0.0.0-ci.$env:GITHUB_RUN_NUMBER" -RequireControls

    - name: Create Release
      uses: ./Github/create-release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
