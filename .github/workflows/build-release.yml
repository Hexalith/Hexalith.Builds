name: Release
on:
  workflow_dispatch:

concurrency:
  group: builds-release-production
  cancel-in-progress: false

permissions: {}

jobs:
  verify-source:
    runs-on: ubuntu-latest
    name: Verify current main source
    permissions:
      contents: read
    steps:
    - name: Require exact current main
      shell: bash
      env:
        GH_TOKEN: ${{ github.token }}
        REPOSITORY: ${{ github.repository }}
        DISPATCH_REF: ${{ github.ref }}
        DISPATCH_SHA: ${{ github.sha }}
      run: |
        set -euo pipefail
        if [ "$DISPATCH_REF" != "refs/heads/main" ]; then
          echo "Builds Release must be dispatched from refs/heads/main." >&2
          exit 1
        fi
        live_main_sha="$(gh api "repos/${REPOSITORY}/git/ref/heads/main" --jq '.object.sha')"
        if [[ ! "$DISPATCH_SHA" =~ ^[0-9a-f]{40}$ ]] || [ "$DISPATCH_SHA" != "$live_main_sha" ]; then
          echo "Builds Release source is not the exact current main tip." >&2
          exit 1
        fi

  release:
    needs: verify-source
    runs-on: ubuntu-latest
    name: Release
    environment: production
    permissions:
      contents: write        # push tag and create GitHub release
      issues: write          # semantic-release comments on released issues
      pull-requests: write   # semantic-release comments on released PRs
      packages: write        # publish future tool packages to GitHub Packages
    steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0
        persist-credentials: false

    - name: Initialize .NET
      uses: ./Github/initialize-dotnet
      with:
        global-json-file: global.json

    - name: Validate central package versions
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/validate-central-package-versions.ps1

    - name: Test authoritative package catalog
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-authoritative-package-catalog.ps1

    - name: Test central package version validator
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-central-package-version-validator.ps1

    - name: Validate Builds consumer package authority
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/validate-consumer-package-authority.ps1 -RepositoryRoot . -CatalogPath ./Props/Directory.Packages.props

    - name: Test consumer package authority validator
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-consumer-package-authority-validator.ps1

    - name: Validate package version exception inventory
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/validate-package-version-exceptions.ps1 -InventoryPath ./Tools/package-version-exceptions.json -CatalogPath ./Props/Directory.Packages.props

    - name: Test package version exception validator
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-package-version-exception-validator.ps1

    - name: Validate Dapr package versions
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/validate-dapr-package-versions.ps1

    - name: Test Dapr package validator
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-dapr-package-version-validator.ps1

    - name: Test domain workflow test-platform contracts
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-domain-workflow-test-platforms.ps1

    - name: Setup Node.js
      uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
      with:
        node-version: 'node'

    - name: Install Node.js dependencies
      run: npm ci

    - name: Verify npm dependency provenance and signatures
      run: npm audit signatures

    - name: Test commitlint workflow contracts
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-commitlint-workflow.ps1

    - name: Qualify G-4 tool source and Release packages
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-g4-tool-package-contracts.ps1 -Version "0.0.0-ci.$env:GITHUB_RUN_NUMBER" -RequireControls

    - name: Test multi-platform container publisher contracts
      shell: pwsh
      run: pwsh -NoProfile -File ./Tools/test-publish-containers.ps1

    - name: Create Release
      uses: ./Github/create-release
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
