name: Hexalith Domain Release

on:
  workflow_call:
    inputs:
      solution:
        description: 'Path to the .slnx/.sln solution to restore and build.'
        required: true
        type: string
      dotnet-global-json:
        required: false
        type: string
        default: 'global.json'
      packages-lock-file:
        description: 'Comma-separated hashFiles() patterns for the NuGet cache key.'
        required: false
        type: string
        default: 'Directory.Packages.props, global.json, references/Hexalith.Builds/Props/Directory.Packages.props'
      dapr-version:
        required: false
        type: string
        default: '1.18.0'
      test-platform:
        description: >-
          Test command contract: vstest uses --logger/--collect; microsoft-testing-platform
          uses the xUnit v3 MTP reporter options.
        required: false
        type: string
        default: 'vstest'
      test-projects:
        description: >-
          Newline-separated test projects (Tier 1+2) run before release. Leave
          empty when the caller already proved exact-source CI success and those
          tiers passed for the same head (see ci-cd-standards.md, Release Gates).
        required: false
        type: string
        default: ''
      node-version:
        required: false
        type: string
        default: 'node'
      timeout-minutes:
        required: false
        type: number
        default: 20
      environment-name:
        description: 'Protected GitHub environment that authorizes the release job.'
        required: false
        type: string
        default: 'production'
      publish-containers:
        description: 'Publish .NET SDK container images during semantic-release.'
        required: false
        type: boolean
        default: false
      container-projects:
        description: 'Newline-separated project-to-repository mappings: path/to/project.csproj|repository-name.'
        required: false
        type: string
        default: ''
      builds-execution-sha:
        description: 'Exact approved Hexalith.Builds commit resolved for the reusable workflow and nested publisher action.'
        required: true
        type: string
      source-branch:
        description: 'Exact protected source branch revalidated at every publication boundary.'
        required: false
        type: string
        default: 'main'
      source-ci-workflow:
        description: 'Caller CI workflow filename required to have successful exact-source push CI.'
        required: false
        type: string
        default: 'ci.yml'
      package-manifest:
        description: 'Caller package manifest frozen into the publication identity.'
        required: false
        type: string
        default: 'tools/release-packages.json'
    secrets:
      NUGET_API_KEY:
        description: 'NuGet.org API key supplied explicitly by the caller.'
        required: true
      HEXALITH_ZOT_USERNAME:
        description: 'Zot username supplied explicitly by the caller when publishing containers.'
        required: false
      HEXALITH_ZOT_API_KEY:
        description: 'Zot API key supplied explicitly by the caller when publishing containers.'
        required: false
permissions:
  actions: read
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    environment: ${{ inputs.environment-name }}
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false
      - name: Validate approved Builds execution identity
        shell: bash
        env:
          BUILD_EXECUTION_SHA: ${{ inputs.builds-execution-sha }}
          RESOLVED_WORKFLOW_REPOSITORY: ${{ job.workflow_repository }}
          RESOLVED_WORKFLOW_SHA: ${{ job.workflow_sha }}
        run: |
          set -euo pipefail
          if [[ ! "$BUILD_EXECUTION_SHA" =~ ^[0-9a-f]{40}$ ]]; then
            echo "builds-execution-sha must be an exact lowercase 40-character commit SHA." >&2
            exit 1
          fi
          if [ "$RESOLVED_WORKFLOW_REPOSITORY" != "Hexalith/Hexalith.Builds" ]; then
            echo "The release job is not defined by the approved Hexalith.Builds repository." >&2
            exit 1
          fi
          if [ "$RESOLVED_WORKFLOW_SHA" != "$BUILD_EXECUTION_SHA" ]; then
            echo "Resolved reusable-workflow SHA does not match the approved Builds identity." >&2
            exit 1
          fi
      - name: Checkout approved Builds actions
        uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          repository: Hexalith/Hexalith.Builds
          ref: ${{ inputs.builds-execution-sha }}
          path: .hexalith/builds-execution
          persist-credentials: false
      - name: Initialize root-declared submodules
        uses: ./.hexalith/builds-execution/Github/initialize-build
      - name: Initialize .NET
        uses: actions/setup-dotnet@a98b56852c35b8e3190ac28c8c2271da59106c68 # v6.0.0
        with:
          global-json-file: ${{ inputs.dotnet-global-json }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles(inputs.packages-lock-file) }}
          restore-keys: nuget-
      - name: Validate test platform input
        if: ${{ inputs.test-platform != 'vstest' && inputs.test-platform != 'microsoft-testing-platform' }}
        shell: bash
        run: |
          echo "Unsupported test-platform '${{ inputs.test-platform }}'. Expected vstest or microsoft-testing-platform." >&2
          exit 1
      - name: Install npm dependencies
        run: npm ci
      - name: Verify npm dependency provenance and signatures
        run: npm audit signatures
      - name: Restore
        run: dotnet restore ${{ inputs.solution }}
      - name: Build
        run: dotnet build ${{ inputs.solution }} --no-restore --configuration Release -warnaserror
      - name: Install and initialize Dapr
        if: ${{ inputs.test-projects != '' }}
        uses: ./.hexalith/builds-execution/Github/dapr-init
        with:
          version: ${{ inputs.dapr-version }}
      - name: Run tests (Tier 1 + 2, VSTest)
        if: ${{ inputs.test-projects != '' && inputs.test-platform == 'vstest' }}
        shell: bash
        env:
          TEST_PROJECTS: ${{ inputs.test-projects }}
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            name=$(basename "$proj")
            dotnet test "$proj" --no-build --configuration Release \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory "TestResults/${name}" \
              --collect:"XPlat Code Coverage"
          done <<< "$TEST_PROJECTS"
      - name: Run tests (Tier 1 + 2, Microsoft.Testing.Platform)
        if: ${{ inputs.test-projects != '' && inputs.test-platform == 'microsoft-testing-platform' }}
        shell: bash
        env:
          TEST_PROJECTS: ${{ inputs.test-projects }}
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            name=$(basename "$proj")
            dotnet test "$proj" --no-build --configuration Release \
              --results-directory "TestResults/${name}" \
              --report-xunit-trx \
              --report-xunit-trx-filename "${name}.trx"
          done <<< "$TEST_PROJECTS"
      - name: Upload release test evidence
        if: ${{ always() && inputs.test-projects != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
          retention-days: 7
      - name: Set up arm64 emulation
        if: ${{ inputs.publish-containers }}
        uses: docker/setup-qemu-action@06116385d9baf250c9f4dcb4858b16962ea869c3 # v4.1.0
        with:
          platforms: arm64
      - name: Prepare release container publisher
        if: ${{ inputs.publish-containers }}
        uses: ./.hexalith/builds-execution/Github/publish-containers
        with:
          container-projects: ${{ inputs.container-projects }}
          builds-execution-sha: ${{ inputs.builds-execution-sha }}
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          HEXALITH_CONTAINER_PROJECTS: ${{ inputs.container-projects }}
          HEXALITH_ZOT_REGISTRY: ${{ vars.HEXALITH_ZOT_REGISTRY || 'registry.hexalith.com' }}
          HEXALITH_ZOT_USERNAME: ${{ secrets.HEXALITH_ZOT_USERNAME }}
          HEXALITH_ZOT_API_KEY: ${{ secrets.HEXALITH_ZOT_API_KEY }}
          HEXALITH_BUILDS_EXECUTION_SHA: ${{ inputs.builds-execution-sha }}
          HEXALITH_RELEASE_ENVIRONMENT: ${{ inputs.environment-name }}
          HEXALITH_RELEASE_SOURCE_BRANCH: ${{ inputs.source-branch }}
          HEXALITH_RELEASE_SOURCE_CI_WORKFLOW: ${{ inputs.source-ci-workflow }}
          HEXALITH_RELEASE_PACKAGE_MANIFEST: ${{ inputs.package-manifest }}
        run: npx semantic-release
      - name: Upload complete release evidence
        if: ${{ always() && inputs.publish-containers }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-evidence-${{ github.run_id }}-${{ github.run_attempt }}
          path: .hexalith/release-evidence/**
          if-no-files-found: warn
          include-hidden-files: true
          retention-days: 30
