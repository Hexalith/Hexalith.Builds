name: Hexalith Domain Release

on:
  workflow_call:
    inputs:
      solution:
        description: 'Path to the .slnx/.sln solution to restore and build.'
        required: true
        type: string
      dotnet-global-json:
        required: false
        type: string
        default: 'global.json'
      packages-lock-file:
        description: 'Comma-separated hashFiles() patterns for the NuGet cache key.'
        required: false
        type: string
        default: 'Directory.Packages.props, global.json, references/Hexalith.Builds/Props/Directory.Packages.props'
      dapr-version:
        required: false
        type: string
        default: '1.18.0'
      test-platform:
        description: >-
          Test command contract: vstest uses --logger/--collect; microsoft-testing-platform
          uses the xUnit v3 MTP reporter options.
        required: false
        type: string
        default: 'vstest'
      test-projects:
        description: >-
          Newline-separated test projects (Tier 1+2) run before release. Leave
          empty when the caller is triggered by workflow_run on CI success — the
          CI gate already ran for the same head, and re-running it here only
          duplicates compute (see ci-cd-standards.md, Release Gates).
        required: false
        type: string
        default: ''
      node-version:
        required: false
        type: string
        default: 'node'
      timeout-minutes:
        required: false
        type: number
        default: 20
      publish-containers:
        description: 'Publish .NET SDK container images during semantic-release.'
        required: false
        type: boolean
        default: false
      container-projects:
        description: 'Newline-separated project-to-repository mappings: path/to/project.csproj|repository-name.'
        required: false
        type: string
        default: ''
    secrets:
      NUGET_API_KEY:
        required: true
      HEXALITH_ZOT_USERNAME:
        required: false
      HEXALITH_ZOT_API_KEY:
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false
      - name: Initialize root-declared submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main
      - name: Initialize .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: ${{ inputs.dotnet-global-json }}
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles(inputs.packages-lock-file) }}
          restore-keys: nuget-
      - name: Validate test platform input
        if: ${{ inputs.test-platform != 'vstest' && inputs.test-platform != 'microsoft-testing-platform' }}
        shell: bash
        run: |
          echo "Unsupported test-platform '${{ inputs.test-platform }}'. Expected vstest or microsoft-testing-platform." >&2
          exit 1
      - name: Install npm dependencies
        run: npm ci
      - name: Verify npm dependency provenance and signatures
        run: npm audit signatures
      - name: Restore
        run: dotnet restore ${{ inputs.solution }}
      - name: Build
        run: dotnet build ${{ inputs.solution }} --no-restore --configuration Release -warnaserror
      - name: Install and initialize Dapr
        if: ${{ inputs.test-projects != '' }}
        uses: Hexalith/Hexalith.Builds/Github/dapr-init@main
        with:
          version: ${{ inputs.dapr-version }}
      - name: Run tests (Tier 1 + 2, VSTest)
        if: ${{ inputs.test-projects != '' && inputs.test-platform == 'vstest' }}
        shell: bash
        env:
          TEST_PROJECTS: ${{ inputs.test-projects }}
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            name=$(basename "$proj")
            dotnet test "$proj" --no-build --configuration Release \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory "TestResults/${name}" \
              --collect:"XPlat Code Coverage"
          done <<< "$TEST_PROJECTS"
      - name: Run tests (Tier 1 + 2, Microsoft.Testing.Platform)
        if: ${{ inputs.test-projects != '' && inputs.test-platform == 'microsoft-testing-platform' }}
        shell: bash
        env:
          TEST_PROJECTS: ${{ inputs.test-projects }}
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            name=$(basename "$proj")
            dotnet test "$proj" --no-build --configuration Release \
              --results-directory "TestResults/${name}" \
              --report-xunit-trx \
              --report-xunit-trx-filename "${name}.trx"
          done <<< "$TEST_PROJECTS"
      - name: Upload release test evidence
        if: ${{ always() && inputs.test-projects != '' }}
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
          retention-days: 7
      - name: Prepare release container publisher
        if: ${{ inputs.publish-containers }}
        uses: Hexalith/Hexalith.Builds/Github/publish-containers@main
        with:
          container-projects: ${{ inputs.container-projects }}
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          HEXALITH_CONTAINER_PROJECTS: ${{ inputs.container-projects }}
          HEXALITH_ZOT_REGISTRY: ${{ vars.HEXALITH_ZOT_REGISTRY || 'registry.hexalith.com' }}
          HEXALITH_ZOT_USERNAME: ${{ secrets.HEXALITH_ZOT_USERNAME }}
          HEXALITH_ZOT_API_KEY: ${{ secrets.HEXALITH_ZOT_API_KEY }}
        run: npx semantic-release
