name: Hexalith Domain Release

on:
  workflow_call:
    inputs:
      solution:
        description: 'Path to the .slnx/.sln solution to restore and build.'
        required: true
        type: string
      dotnet-global-json:
        required: false
        type: string
        default: 'global.json'
      packages-lock-file:
        required: false
        type: string
        default: 'Directory.Packages.props'
      dapr-version:
        required: false
        type: string
        default: '1.18.0'
      test-projects:
        description: 'Newline-separated test projects (Tier 1+2) run before release.'
        required: false
        type: string
        default: ''
      node-version:
        required: false
        type: string
        default: 'lts/*'
      timeout-minutes:
        required: false
        type: number
        default: 20
    secrets:
      NUGET_API_KEY:
        required: true

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false
      - name: Initialize root-declared submodules
        shell: bash
        run: git -c submodule.recurse=false submodule update --init
      - name: Initialize .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: ${{ inputs.dotnet-global-json }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles(inputs.packages-lock-file) }}
          restore-keys: nuget-
      - name: Install npm dependencies
        run: npm ci
      - name: Restore
        run: dotnet restore ${{ inputs.solution }}
      - name: Build
        run: dotnet build ${{ inputs.solution }} --no-restore --configuration Release -warnaserror
      - name: Install and initialize Dapr
        if: ${{ inputs.test-projects != '' }}
        uses: dapr/setup-dapr@8d980918fd43a2765c143ce7f687665b2d46a6b9 # v2
        with:
          version: ${{ inputs.dapr-version }}
      - name: Run dapr init
        if: ${{ inputs.test-projects != '' }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: dapr init
      - name: Run tests (Tier 1 + 2)
        if: ${{ inputs.test-projects != '' }}
        shell: bash
        env:
          TEST_PROJECTS: ${{ inputs.test-projects }}
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            name=$(basename "$proj")
            dotnet test "$proj" --no-build --configuration Release \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory "TestResults/${name}" \
              --collect:"XPlat Code Coverage"
          done <<< "$TEST_PROJECTS"
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
        run: npx semantic-release
