name: Hexalith Domain Release

on:
  workflow_call:
    inputs:
      solution:
        description: 'Path to the .slnx/.sln solution to restore and build.'
        required: true
        type: string
      dotnet-global-json:
        required: false
        type: string
        default: 'global.json'
      packages-lock-file:
        required: false
        type: string
        default: 'Directory.Packages.props'
      dapr-version:
        required: false
        type: string
        default: '1.18.0'
      test-projects:
        description: 'Newline-separated test projects (Tier 1+2) run before release.'
        required: false
        type: string
        default: ''
      node-version:
        required: false
        type: string
        default: 'lts/*'
      timeout-minutes:
        required: false
        type: number
        default: 20
      publish-containers:
        description: 'Publish .NET SDK container images during semantic-release.'
        required: false
        type: boolean
        default: false
      container-projects:
        description: 'Newline-separated project-to-repository mappings: path/to/project.csproj|repository-name.'
        required: false
        type: string
        default: ''
    secrets:
      NUGET_API_KEY:
        required: true
      HEXALITH_ZOT_USERNAME:
        required: false
      HEXALITH_ZOT_API_KEY:
        required: false

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  release:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.timeout-minutes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: false
          persist-credentials: false
      - name: Initialize root-declared submodules
        shell: bash
        run: git -c submodule.recurse=false submodule update --init
      - name: Initialize .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: ${{ inputs.dotnet-global-json }}
      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles(inputs.packages-lock-file) }}
          restore-keys: nuget-
      - name: Install npm dependencies
        run: npm ci
      - name: Restore
        run: dotnet restore ${{ inputs.solution }}
      - name: Build
        run: dotnet build ${{ inputs.solution }} --no-restore --configuration Release -warnaserror
      - name: Install and initialize Dapr
        if: ${{ inputs.test-projects != '' }}
        uses: dapr/setup-dapr@8d980918fd43a2765c143ce7f687665b2d46a6b9 # v2
        with:
          version: ${{ inputs.dapr-version }}
      - name: Run dapr init
        if: ${{ inputs.test-projects != '' }}
        uses: nick-fields/retry@ad984534de44a9489a53aefd81eb77f87c70dc60 # v4.0.0
        with:
          timeout_minutes: 5
          max_attempts: 3
          retry_wait_seconds: 15
          command: dapr init
      - name: Run tests (Tier 1 + 2)
        if: ${{ inputs.test-projects != '' }}
        shell: bash
        env:
          TEST_PROJECTS: ${{ inputs.test-projects }}
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            name=$(basename "$proj")
            dotnet test "$proj" --no-build --configuration Release \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory "TestResults/${name}" \
              --collect:"XPlat Code Coverage"
          done <<< "$TEST_PROJECTS"
      - name: Login to Hexalith Zot
        if: ${{ inputs.publish-containers }}
        uses: docker/login-action@c99871dec2022cc055c062a10cc1a1310835ceb4 # v4.3.0
        with:
          registry: ${{ vars.HEXALITH_ZOT_REGISTRY || 'registry.hexalith.com' }}
          username: ${{ secrets.HEXALITH_ZOT_USERNAME }}
          password: ${{ secrets.HEXALITH_ZOT_API_KEY }}
      - name: Prepare release container publisher
        if: ${{ inputs.publish-containers }}
        shell: bash
        env:
          HEXALITH_CONTAINER_PROJECTS: ${{ inputs.container-projects }}
        run: |
          set -euo pipefail
          if [ -z "${HEXALITH_CONTAINER_PROJECTS//[[:space:]]/}" ]; then
            echo "container-projects is required when publish-containers is true." >&2
            exit 1
          fi

          mkdir -p .hexalith/release
          cat > .hexalith/release/publish-containers.sh <<'BASH'
          #!/usr/bin/env bash
          set -euo pipefail

          version="${1:-}"
          registry="${HEXALITH_ZOT_REGISTRY:-registry.hexalith.com}"
          projects="${HEXALITH_CONTAINER_PROJECTS:-}"
          semver_pattern='^[0-9]+\.[0-9]+\.[0-9]+(-[0-9A-Za-z.-]+)?$'

          trim() {
            local value="$1"
            value="${value#"${value%%[![:space:]]*}"}"
            value="${value%"${value##*[![:space:]]}"}"
            printf '%s' "$value"
          }

          fail() {
            echo "[publish-containers] $1" >&2
            exit 1
          }

          [ -n "$version" ] || fail "Release version argument is required."
          [[ "$version" =~ $semver_pattern ]] || fail "Release version '$version' must be SemVer without build metadata."
          [ -n "${projects//[[:space:]]/}" ] || fail "HEXALITH_CONTAINER_PROJECTS is empty."

          while IFS= read -r raw_line; do
            line="$(trim "${raw_line%$'\r'}")"
            [ -n "$line" ] || continue

            IFS='|' read -r project repository extra <<< "$line"
            project="$(trim "$project")"
            repository="$(trim "$repository")"
            extra="$(trim "${extra:-}")"

            [ -z "$extra" ] || fail "Invalid container mapping '$line'. Expected project|repository."
            [ -n "$project" ] || fail "Container project path is empty in '$line'."
            [ -n "$repository" ] || fail "Container repository is empty in '$line'."
            [ -f "$project" ] || fail "Container project not found: $project"

            echo "[publish-containers] Publishing ${registry}/${repository}:${version} from ${project}"
            dotnet publish "$project" \
              --configuration Release \
              --os linux \
              --arch x64 \
              /t:PublishContainer \
              -p:ContainerRegistry="$registry" \
              -p:ContainerRepository="$repository" \
              -p:ContainerImageTag="$version" \
              -p:Version="$version"
          done <<< "$projects"
          BASH
          chmod +x .hexalith/release/publish-containers.sh
      - name: Semantic Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          NUGET_API_KEY: ${{ secrets.NUGET_API_KEY }}
          HEXALITH_CONTAINER_PROJECTS: ${{ inputs.container-projects }}
          HEXALITH_ZOT_REGISTRY: ${{ vars.HEXALITH_ZOT_REGISTRY || 'registry.hexalith.com' }}
        run: npx semantic-release
