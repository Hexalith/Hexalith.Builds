name: Hexalith Dependency Review

# Reusable PR gate that blocks dependencies with known vulnerabilities or non-compliant licenses.
# Consuming modules call this from a pull_request-triggered caller.

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: 'Minimum severity that fails the check (low | moderate | high | critical).'
        required: false
        type: string
        default: 'high'

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7.0.1
        with:
          submodules: false
      - name: Dependency review
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v4
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          comment-summary-in-pr: on-failure
