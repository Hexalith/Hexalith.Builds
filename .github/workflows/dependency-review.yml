name: Hexalith Dependency Review

# Reusable PR gate that blocks dependencies with known vulnerabilities or non-compliant licenses.
# Consuming modules call this from a pull_request-triggered caller.

on:
  workflow_call:
    inputs:
      fail-on-severity:
        description: 'Minimum severity that fails the check (low | moderate | high | critical).'
        required: false
        type: string
        default: 'high'

permissions:
  contents: read

jobs:
  dependency-review:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          submodules: false
      - name: Dependency review
        uses: actions/dependency-review-action@2031cfc080254a8a887f58cffee85186f0e49e48 # v4
        with:
          fail-on-severity: ${{ inputs.fail-on-severity }}
          comment-summary-in-pr: on-failure
