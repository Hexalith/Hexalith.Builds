name: Hexalith Domain CI

on:
  workflow_call:
    inputs:
      solution:
        description: 'Path to the .slnx/.sln solution to restore and build.'
        required: true
        type: string
      dotnet-global-json:
        description: 'Path to global.json pinning the .NET SDK.'
        required: false
        type: string
        default: 'global.json'
      packages-lock-file:
        description: >-
          Comma-separated hashFiles() patterns for the NuGet cache key. The default
          covers the module package props, global.json, and the shared package props
          imported from the Hexalith.Builds submodule; patterns that match nothing
          are simply ignored.
        required: false
        type: string
        default: 'Directory.Packages.props, global.json, references/Hexalith.Builds/Props/Directory.Packages.props'
      dapr-version:
        description: 'Dapr version for integration/aspire tiers.'
        required: false
        type: string
        default: '1.18.0'
      unit-test-projects:
        description: 'Newline-separated Tier 1 test project paths (no Dapr).'
        required: false
        type: string
        default: ''
      integration-test-projects:
        description: 'Newline-separated Tier 2 test project paths (require Dapr).'
        required: false
        type: string
        default: ''
      aspire-test-project:
        description: 'Tier 3 Aspire test project path. When set, enables the aspire and performance jobs.'
        required: false
        type: string
        default: ''
      aspire-non-performance-filter:
        description: 'dotnet test --filter for the non-performance Aspire tier.'
        required: false
        type: string
        default: 'Category!=Performance'
      performance-filter:
        description: 'dotnet test --filter for the nightly performance tier.'
        required: false
        type: string
        default: 'Category=Performance'
      run-consumer-validation:
        description: 'Run scripts/pack + validate-nuget + validate-consumer package checks.'
        required: false
        type: boolean
        default: false
      run-coverage-gate:
        description: 'Run scripts/validate-coverage.py over TestResults.'
        required: false
        type: boolean
        default: false
      coverage-minimum-line:
        description: 'Minimum line coverage percentage.'
        required: false
        type: number
        default: 80
      coverage-required-branch:
        description: 'Required branch coverage percentage.'
        required: false
        type: number
        default: 100
      coverage-isolation-targets:
        description: 'Newline-separated files passed as --isolation-auth-target.'
        required: false
        type: string
        default: ''
      coverage-line-scope:
        description: >-
          Newline-separated source path prefixes passed as --line-scope to
          scripts/validate-coverage.py (the production projects the line gate is
          scoped to). When empty, the script falls back to its built-in default.
        required: false
        type: string
        default: ''
      aspire-continue-on-error:
        description: 'Whether the Aspire tier is non-blocking.'
        required: false
        type: boolean
        default: true
      build-timeout-minutes:
        required: false
        type: number
        default: 15
      aspire-timeout-minutes:
        required: false
        type: number
        default: 10
      performance-timeout-minutes:
        required: false
        type: number
        default: 60

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.build-timeout-minutes }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: false
      - name: Initialize root-declared submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main
      - name: Initialize .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: ${{ inputs.dotnet-global-json }}
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles(inputs.packages-lock-file) }}
          restore-keys: nuget-
      - name: Restore
        run: dotnet restore ${{ inputs.solution }}
      - name: Build
        run: dotnet build ${{ inputs.solution }} --no-restore --configuration Release -warnaserror
      - name: Validate package consumer references
        if: ${{ inputs.run-consumer-validation }}
        shell: bash
        run: |
          set -euo pipefail
          rm -rf ./nupkgs
          python3 scripts/pack-release-packages.py ./nupkgs 0.0.0-ci-test
          python3 scripts/validate-nuget-packages.py ./nupkgs
          python3 scripts/validate-consumer-package-references.py ./nupkgs
      - name: Unit tests (Tier 1)
        if: ${{ inputs.unit-test-projects != '' }}
        shell: bash
        env:
          UNIT_TEST_PROJECTS: ${{ inputs.unit-test-projects }}
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            name=$(basename "$proj")
            dotnet test "$proj" --no-build --configuration Release \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory "TestResults/${name}" \
              --collect:"XPlat Code Coverage"
          done <<< "$UNIT_TEST_PROJECTS"
      - name: Install and initialize Dapr
        if: ${{ inputs.integration-test-projects != '' }}
        uses: Hexalith/Hexalith.Builds/Github/dapr-init@main
        with:
          version: ${{ inputs.dapr-version }}
      - name: Integration tests (Tier 2)
        if: ${{ inputs.integration-test-projects != '' }}
        shell: bash
        env:
          INTEGRATION_TEST_PROJECTS: ${{ inputs.integration-test-projects }}
        run: |
          set -euo pipefail
          while IFS= read -r proj; do
            [ -z "$proj" ] && continue
            name=$(basename "$proj")
            dotnet test "$proj" --no-build --configuration Release \
              --logger "trx;LogFileName=${name}.trx" \
              --results-directory "TestResults/${name}" \
              --collect:"XPlat Code Coverage"
          done <<< "$INTEGRATION_TEST_PROJECTS"
      - name: Validate coverage gates
        if: ${{ inputs.run-coverage-gate }}
        shell: bash
        env:
          COVERAGE_ISOLATION_TARGETS: ${{ inputs.coverage-isolation-targets }}
          COVERAGE_LINE_SCOPE: ${{ inputs.coverage-line-scope }}
        run: |
          set -euo pipefail
          args=(--coverage-root TestResults
                --minimum-line-coverage ${{ inputs.coverage-minimum-line }}
                --required-branch-coverage ${{ inputs.coverage-required-branch }})
          while IFS= read -r tgt; do
            [ -z "$tgt" ] && continue
            args+=(--isolation-auth-target "$tgt")
          done <<< "$COVERAGE_ISOLATION_TARGETS"
          while IFS= read -r prefix; do
            [ -z "$prefix" ] && continue
            args+=(--line-scope "$prefix")
          done <<< "$COVERAGE_LINE_SCOPE"
          python3 scripts/validate-coverage.py "${args[@]}" --summary-file "$GITHUB_STEP_SUMMARY"
      - name: Upload test and coverage evidence
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: blocking-test-results
          path: |
            TestResults/**/*.trx
            TestResults/**/coverage.cobertura.xml
          retention-days: 7

  aspire-tests:
    if: ${{ inputs.aspire-test-project != '' }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.aspire-timeout-minutes }}
    needs: build-and-test
    continue-on-error: ${{ inputs.aspire-continue-on-error }}
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: false
      - name: Initialize root-declared submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main
      - name: Initialize .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: ${{ inputs.dotnet-global-json }}
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles(inputs.packages-lock-file) }}
          restore-keys: nuget-
      - name: Restore and Build
        run: |
          dotnet restore ${{ inputs.solution }}
          dotnet build ${{ inputs.solution }} --no-restore --configuration Release -warnaserror
      - name: Install and initialize Dapr
        uses: Hexalith/Hexalith.Builds/Github/dapr-init@main
        with:
          version: ${{ inputs.dapr-version }}
      # Coverage is not collected here: this tier is advisory (non-blocking by
      # default) and its coverage is intentionally excluded from the gates.
      - name: Aspire contract tests (Tier 3, non-Performance)
        shell: bash
        run: >
          dotnet test "${{ inputs.aspire-test-project }}"
          --no-build --configuration Release
          --filter "${{ inputs.aspire-non-performance-filter }}"
          --logger "trx;LogFileName=aspire-results.trx"
          --results-directory TestResults/aspire
      - name: Test summary
        if: always()
        run: |
          echo "## Tier 3 Aspire Contract Tests" >> $GITHUB_STEP_SUMMARY
          echo "Status: ${{ job.status }}" >> $GITHUB_STEP_SUMMARY
      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: aspire-test-results
          path: "TestResults/**/*.trx"
          retention-days: 7

  performance-tests:
    if: ${{ inputs.aspire-test-project != '' && github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    timeout-minutes: ${{ inputs.performance-timeout-minutes }}
    needs: build-and-test
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: false
      - name: Initialize root-declared submodules
        uses: Hexalith/Hexalith.Builds/Github/initialize-build@main
      - name: Initialize .NET
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0
        with:
          global-json-file: ${{ inputs.dotnet-global-json }}
      - name: Cache NuGet packages
        uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: ~/.nuget/packages
          key: nuget-${{ hashFiles(inputs.packages-lock-file) }}
          restore-keys: nuget-
      - name: Restore and Build
        run: |
          dotnet restore ${{ inputs.solution }}
          dotnet build ${{ inputs.solution }} --no-restore --configuration Release -warnaserror
      - name: Install and initialize Dapr
        uses: Hexalith/Hexalith.Builds/Github/dapr-init@main
        with:
          version: ${{ inputs.dapr-version }}
      - name: Performance tests (Tier 3, nightly only)
        id: performance-tests
        shell: bash
        env:
          HEXALITH_EVENTSTORE_RUN_PERFORMANCE_TESTS: '1'
          HEXALITH_TENANTS_RUN_PERFORMANCE_TESTS: '1'
        run: >
          dotnet test "${{ inputs.aspire-test-project }}"
          --no-build --configuration Release
          --filter "${{ inputs.performance-filter }}"
          --logger "trx;LogFileName=perf-results.trx"
          --results-directory TestResults/performance
      - name: Validate performance test execution
        if: always()
        shell: bash
        env:
          PERFORMANCE_FILTER: ${{ inputs.performance-filter }}
          PERFORMANCE_TEST_STEP_OUTCOME: ${{ steps.performance-tests.outcome }}
        run: |
          python3 - <<'PY'
          import datetime
          import json
          import os
          import sys
          import xml.etree.ElementTree as ET
          from pathlib import Path

          evidence_directory = Path("TestResults/performance")
          trx_path = evidence_directory / "perf-results.trx"
          summary_path = evidence_directory / "performance-test-summary.json"
          evidence_directory.mkdir(parents=True, exist_ok=True)

          summary = {
              "schemaVersion": 1,
              "generatedAtUtc": datetime.datetime.now(datetime.UTC).isoformat(),
              "repository": os.environ.get("GITHUB_REPOSITORY", ""),
              "commitSha": os.environ.get("GITHUB_SHA", ""),
              "ref": os.environ.get("GITHUB_REF", ""),
              "runId": os.environ.get("GITHUB_RUN_ID", ""),
              "runAttempt": os.environ.get("GITHUB_RUN_ATTEMPT", ""),
              "filter": os.environ.get("PERFORMANCE_FILTER", ""),
              "testStepOutcome": os.environ.get("PERFORMANCE_TEST_STEP_OUTCOME", ""),
              "trxPath": str(trx_path),
              "status": "unknown",
              "counts": {
                  "total": None,
                  "executed": None,
                  "passed": None,
                  "failed": None,
                  "skipped": None,
              },
          }

          def local_name(element):
              return element.tag.rsplit("}", 1)[-1]

          def write_evidence():
              summary_path.write_text(
                  json.dumps(summary, indent=2, sort_keys=True) + "\n",
                  encoding="utf-8",
              )

              github_summary = os.environ.get("GITHUB_STEP_SUMMARY")
              if github_summary:
                  counts = summary["counts"]
                  with Path(github_summary).open("a", encoding="utf-8") as stream:
                      stream.write("## Scheduled Performance Tests\n\n")
                      stream.write(f"- Status: `{summary['status']}`\n")
                      stream.write(f"- Test step: `{summary['testStepOutcome']}`\n")
                      stream.write(f"- Filter: `{summary['filter']}`\n")
                      stream.write(f"- TRX: `{summary['trxPath']}`\n")
                      stream.write(
                          "- Counts: "
                          f"total={counts['total']}, executed={counts['executed']}, "
                          f"passed={counts['passed']}, failed={counts['failed']}, "
                          f"skipped={counts['skipped']}\n\n"
                      )

          if not trx_path.is_file():
              summary["status"] = "missing-trx"
              write_evidence()
              print(
                  f"::error title=Missing performance TRX::Expected {trx_path} "
                  "but the performance test step produced no result file."
              )
              sys.exit(1)

          try:
              root = ET.parse(trx_path).getroot()
              counters = next(
                  (element for element in root.iter() if local_name(element) == "Counters"),
                  None,
              )
              if counters is None:
                  raise ValueError("TRX does not contain a Counters element")

              counts = {
                  "total": int(counters.get("total", "0")),
                  "executed": int(counters.get("executed", "0")),
                  "passed": int(counters.get("passed", "0")),
                  "failed": int(counters.get("failed", "0")),
                  "skipped": sum(
                      1
                      for element in root.iter()
                      if local_name(element) == "UnitTestResult"
                      and element.get("outcome") == "NotExecuted"
                  ),
              }
              summary["counts"] = counts
          except (ET.ParseError, OSError, TypeError, ValueError) as error:
              summary["status"] = "invalid-trx"
              summary["diagnostic"] = str(error)
              write_evidence()
              print(f"::error title=Invalid performance TRX::{error}")
              sys.exit(1)

          if counts["total"] == 0:
              summary["status"] = "no-matching-tests"
              write_evidence()
              print(
                  "::error title=No matching performance tests::The performance filter "
                  "selected zero tests."
              )
              sys.exit(1)

          if counts["executed"] == 0:
              summary["status"] = "all-tests-skipped"
              write_evidence()
              print(
                  "::error title=All performance tests skipped::The performance filter "
                  f"selected {counts['total']} test(s), but none executed."
              )
              sys.exit(1)

          if summary["testStepOutcome"] != "success":
              summary["status"] = "test-step-failed"
          else:
              summary["status"] = (
                  "test-failures" if counts["failed"] > 0 else "executed"
              )
          write_evidence()
          PY
      - name: Upload performance test results
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: performance-test-results
          path: TestResults/performance
          if-no-files-found: error
          retention-days: 7
