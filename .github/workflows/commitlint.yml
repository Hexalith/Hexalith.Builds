name: Hexalith Commitlint

# Reusable Conventional Commits gate. semantic-release derives the next version and changelog
# solely from commit messages, so a malformed commit silently breaks versioning. Consuming
# modules call this from a pull_request-triggered caller (and, for repositories that push
# directly to main, a push-triggered caller) and must ship @commitlint/* devDependencies,
# a commitlint config, and a package-lock.json (npm ci).

on:
  workflow_call:
    inputs:
      node-version:
        required: false
        type: string
        default: 'node'
      pull-request-title:
        description: 'Exact pull request title supplied by a pull_request caller.'
        required: false
        type: string
        default: ''

permissions:
  contents: read

jobs:
  commitlint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          submodules: false
      - uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: ${{ inputs.node-version }}
      - name: Install dependencies
        run: npm ci
      - name: Verify npm dependency provenance and signatures
        run: npm audit signatures
      - name: Validate commit messages
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          PR_TITLE: ${{ inputs.pull-request-title }}
          PR_BASE_SHA: ${{ github.event.pull_request.base.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
          PUSH_BEFORE_SHA: ${{ github.event.before }}
          PUSH_AFTER_SHA: ${{ github.event.after }}
        run: |
          set -euo pipefail
          if [ "$EVENT_NAME" = "pull_request" ]; then
            if [ -z "${PR_TITLE//[[:space:]]/}" ]; then
              echo "pull-request-title is required for pull_request validation." >&2
              exit 1
            fi
            printf '%s\n' "$PR_TITLE" | node --input-type=module -e '
              import lint from "@commitlint/lint";
              import load from "@commitlint/load";

              let title = "";
              for await (const chunk of process.stdin) title += chunk;
              title = title.replace(/\r?\n$/, "");
              const configuration = await load({}, { cwd: process.cwd() });
              const result = await lint(title, configuration.rules, {
                parserOpts: configuration.parserPreset?.parserOpts,
                ignores: configuration.ignores,
                defaultIgnores: false,
              });
              for (const error of result.errors) console.error(`${error.name}: ${error.message}`);
              if (!result.valid) process.exitCode = 1;
            '
            npx commitlint --from "$PR_BASE_SHA" --to "$PR_HEAD_SHA" --verbose
          elif [ -n "$PUSH_BEFORE_SHA" ] &&
               [ "$PUSH_BEFORE_SHA" != "0000000000000000000000000000000000000000" ] &&
               git cat-file -e "$PUSH_BEFORE_SHA" 2>/dev/null; then
            npx commitlint --from "$PUSH_BEFORE_SHA" --to "$PUSH_AFTER_SHA" --verbose
          else
            # Branch creation or force-push with an unreachable before-SHA:
            # validate at least the head commit rather than failing on the range.
            npx commitlint --last --verbose
          fi
