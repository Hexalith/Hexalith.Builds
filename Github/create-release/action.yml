name: Create Release
description: 'Run the repository-configured semantic-release lifecycle (version, changelog, optional package lifecycle, GitHub release)'

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 'node'

    - name: Install semantic-release dependencies
      shell: bash
      run: npm ci

    - name: Verify dependency provenance and signatures
      shell: bash
      run: npm audit signatures

    - name: Semantic Release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        NUGET_API_KEY: ${{ env.NUGET_API_KEY }}
      run: npx semantic-release
