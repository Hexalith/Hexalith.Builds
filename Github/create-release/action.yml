name: Create Release
description: 'Release with semantic-release (version, changelog, git commit, GitHub release) — no package build'

runs:
  using: "composite"
  steps:
    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 'node'

    - name: Install semantic-release dependencies
      shell: bash
      run: npm ci

    - name: Verify dependency provenance and signatures
      shell: bash
      run: npm audit signatures

    - name: Semantic Release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
      run: npx semantic-release
