name: Build Packages
description: 'Build and release Hexalith .NET package projects with semantic-release (run after the verify job)'

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
      with:
        fetch-depth: 0

    - name: Initialize build submodules
      shell: bash
      run: git -c submodule.recurse=false submodule update --init

    - name: Initialize .NET
      uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5.4.0

    - name: Setup Node.js
      uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
      with:
        node-version: 'node'

    - name: Install semantic-release dependencies
      shell: bash
      run: npm ci

    - name: Verify dependency provenance and signatures
      shell: bash
      run: npm audit signatures

    # One-pass release: semantic-release computes the version from Conventional
    # Commits and drives the .NET build (prepare) and NuGet publish (publish)
    # through @semantic-release/exec. The build and publish steps only run when
    # a release is actually warranted, so no explicit gating is needed.
    - name: Semantic Release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        NUGET_API_KEY: ${{ env.NUGET_API_KEY }}
      run: npx semantic-release
