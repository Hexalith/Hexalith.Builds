name: Build Packages
description: 'Build, test, and release Hexalith .NET package projects with semantic-release'

inputs:
  project-name:
    description: 'The name of the project'
    required: true

runs:
  using: "composite"
  steps:
    - uses: actions/checkout@v5
      with:
        fetch-depth: 0

    - name: Initialize build submodules
      uses: Hexalith/Hexalith.Builds/Github/initialize-build@v4.16.0

    - name: Initialize .NET
      uses: Hexalith/Hexalith.Builds/Github/initialize-dotnet@v4.16.0

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: 'lts/*'

    - name: Install semantic-release dependencies
      shell: bash
      run: npm ci

    - name: Verify dependency provenance and signatures
      shell: bash
      run: npm audit signatures

    - name: Run unit tests
      uses: Hexalith/Hexalith.Builds/Github/unit-tests@v4.16.0
      with:
        project-name: ${{ inputs.project-name }}

    # One-pass release: semantic-release computes the version from Conventional
    # Commits and drives the .NET build (prepare) and NuGet publish (publish)
    # through @semantic-release/exec. The build and publish steps only run when
    # a release is actually warranted, so no explicit gating is needed.
    - name: Semantic Release
      shell: bash
      env:
        GITHUB_TOKEN: ${{ env.GITHUB_TOKEN }}
        NUGET_API_KEY: ${{ env.NUGET_API_KEY }}
      run: npx semantic-release
