name: 'Initialize Dapr'
description: 'Installs the Dapr CLI and runs dapr init with retry'

inputs:
  version:
    description: 'Dapr runtime/CLI version to install'
    required: false
    default: '1.17.0'

runs:
  using: "composite"
  steps:
    - name: Install Dapr CLI
      uses: dapr/setup-dapr@main
      with:
        version: ${{ inputs.version }}

    - name: Initialize Dapr
      uses: nick-fields/retry@master
      with:
        timeout_minutes: 5
        max_attempts: 3
        retry_wait_seconds: 15
        command: dapr init
